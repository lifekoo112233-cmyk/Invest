<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <meta name="theme-color" content="#0a0e1a"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Grid Trader"/>
  <link rel="manifest" href="/manifest.json"/>
  <title>Grid Trader</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a0e1a;color:#e0e6f0;-webkit-tap-highlight-color:transparent}
    input[type=range]{-webkit-appearance:none;width:100%;height:4px;background:#1e2a45;border-radius:2px;outline:none}
    input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;background:#4a9eff;border-radius:50%;cursor:pointer}
    button{font-family:inherit;cursor:pointer}
    ::-webkit-scrollbar{width:3px;height:3px}
    ::-webkit-scrollbar-thumb{background:#1e2a45;border-radius:2px}
  </style>
</head>
<body>
  <div id="root"></div>
</body>
</html>
